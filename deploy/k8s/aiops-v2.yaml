apiVersion: v1
kind: Namespace
metadata:
  name: aiops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-v2-config
  namespace: aiops
data:
  AIOPS_HTTP_ADDR: ":8080"
  AIOPS_GRPC_ADDR: ":18090"
  AIOPS_DATA_DIR: "/var/lib/aiops"
  AIOPS_WEB_DIST_DIR: "/app/web/dist"
  # Coroot is configured from the Coroot Observability page after startup.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aiops-v2-data
  namespace: aiops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-v2
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-v2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-v2
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: aiops-v2
          image: registry.example.com/aiops-v2:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aiops-v2-config
            - secretRef:
                name: aiops-v2-secret
          env:
            - name: KUBECONFIG
              value: /etc/kubernetes/admin.conf
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 18090
              hostPort: 8002
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/aiops
            - name: host-kubectl
              mountPath: /usr/local/bin/kubectl
              readOnly: true
            - name: host-kubeconfig
              mountPath: /etc/kubernetes/admin.conf
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aiops-v2-data
        - name: host-kubectl
          hostPath:
            path: /usr/local/bin/kubectl
            type: File
        - name: host-kubeconfig
          hostPath:
            path: /etc/kubernetes/admin.conf
            type: File
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-v2
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-v2
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-v2
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 18090
      targetPort: grpc
